notes = """
INSERT INTO ... SELECT with `WHERE 1=0` to guarantee zero rows are
inserted, plus a non-existent target table so the engine rejects with
0x2b02 before any row movement. The SELECT side is syntactically
complete and parses on its own; the INSERT wrapper is what's being
tested here.

Grammar accepts (schema-agnostic); engine rejects on table-not-found.
