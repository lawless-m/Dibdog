status = "meaningful"
provenance = "manual"
tags = ["select", "projection", "parentheses", "round-trip-tricky"]
notes = """
A redundant pair of parentheses around a single-column projection.
Engine treats `(CODE)` identically to `CODE`; the resulting AST term
should not encode the parentheses (they're a surface-syntax artefact,
not a semantic one). The DCG's generator will therefore emit the
canonical form `select CODE from CUSTOMER`, and a round-trip
(parse → term → generate → re-parse → term) must produce the same
term — the surface SQL string is NOT expected to be byte-equal to the
input. This is the round-trip-tricky entry per CORPUS.md's promotion
bar (criterion 3).
"""
