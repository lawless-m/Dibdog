[divergence]
reason = "Engine rejects with reqcode 0x2ead (parse error) — the error message reads 'Expected column name but instead found code in SELECT SQL statement', but the actual cause is schema-level: the `analysis` table has no `code` column (it has SAREF/SACUST/SAPRODUCT/...). DBISAM's parser validates column-belongs-to-FROM-table eagerly and reuses the 0x2ead 'parse error' channel to surface it, which is why the message wording is misleading. The grammar accepts the SQL because column-to-table binding is a catalog concern outside the DCG's scope; the same SQL on a table that DOES have a `code` column (CUSTOMER, product) accepts cleanly."
reference = "docs/reqcodes.md#0x2ead-parse-syntax-error"

