notes = """
Captured at runtime from a mrsflow Exportmaster.Query path with
MRSFLOW_SQL_LOG enabled. Unlike the static .pq/.m extraction
(power_bi_observed/), this is the SQL string AFTER any M-language
concatenation and parameter interpolation — i.e., what the engine
actually sees on the wire.

REJECTED. Error message: "Expected column name but instead found
code in SELECT SQL statement" (reqcode 0x2ead, code_a=1, code_b=8).
Investigation: `select code from CUSTOMER` accepts (CUSTOMER has a
CODE column); `select code from product` accepts (product has a
CODE column); `select code from analysis` rejects with the same
message. The `analysis` table has SAREF/SACUST/SAPRODUCT/etc. but
no `code` column. DBISAM's parser validates column-belongs-to-FROM-
table EAGERLY, at parse time. The "Expected column name but
instead found X" message is overloaded: true parse error OR
"X is not a column on this table". The DCG should match the
parser's syntactic strictness but stay schema-agnostic — schema
validation is an engine concern, not a grammar concern. Catalogued
in docs/reqcodes.md.
"""
